services:
  postgres:
    image: postgres:16-alpine
    container_name: rendering-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rendering_cms}
      POSTGRES_USER: ${POSTGRES_USER:-rendering}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rendering_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - rendering_cms_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rendering} -d ${POSTGRES_DB:-rendering_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rendering-cms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rendering}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rendering_dev_password}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://127.0.0.1:3000,http://127.0.0.1:5173,http://localhost:3000,http://localhost:5173}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rendering_cms_minio:/data

  minio-init:
    image: minio/mc:latest
    container_name: rendering-cms-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-rendering} ${MINIO_ROOT_PASSWORD:-rendering_dev_password};
      mc mb --ignore-existing local/${MINIO_BUCKET:-rendering-assets};
      mc anonymous set none local/${MINIO_BUCKET:-rendering-assets};
      "

  backend:
    image: golang:1.26-alpine
    container_name: rendering-cms-backend
    profiles:
      - backend
    working_dir: /workspace/backend
    command: >
      sh -lc "
      if [ ! -f go.mod ]; then
        echo 'backend/go.mod not found. Create the Go backend before starting this service.';
        exit 1;
      fi;
      /usr/local/go/bin/go mod download;
      /usr/local/go/bin/go run ./cmd/server
      "
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-0.0.0.0:8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-rendering}:${POSTGRES_PASSWORD:-rendering_dev_password}@postgres:5432/${POSTGRES_DB:-rendering_cms}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-replace-with-32-plus-character-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:5173}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://127.0.0.1:3000,http://127.0.0.1:5173,http://localhost:3000,http://localhost:5173}
      LOG_DIR: ${LOG_DIR:-/var/log/rendering-cms-platform}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://127.0.0.1:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-rendering-assets}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rendering}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rendering_dev_password}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../..:/workspace
      - ${BACKEND_LOG_HOST_DIR:-../../logs/backend}:/var/log/rendering-cms-platform
      - rendering_cms_go_pkg_mod:/go/pkg/mod
      - rendering_cms_go_build_cache:/root/.cache/go-build

  frontend:
    image: node:22-alpine
    container_name: rendering-cms-frontend
    profiles:
      - frontend
    working_dir: /workspace/frontend
    command: >
      sh -lc "
      if [ ! -f package.json ]; then
        echo 'frontend/package.json not found. Create the Vite frontend before starting this service.';
        exit 1;
      fi;
      npm install;
      npm run dev -- --host 0.0.0.0
      "
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://127.0.0.1:8080/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
      - rendering_cms_frontend_node_modules:/workspace/frontend/node_modules

volumes:
  rendering_cms_postgres:
  rendering_cms_minio:
  rendering_cms_frontend_node_modules:
  rendering_cms_go_pkg_mod:
  rendering_cms_go_build_cache:
