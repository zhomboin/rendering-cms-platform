# Rendering CMS Platform 生产反向代理配置。
# 安装示例：
#   sudo cp deploy/nginx/rendering.me.conf /etc/nginx/conf.d/rendering.me.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 如果服务器上的 Cloudflare Origin Certificate 路径不同，请替换下方证书路径。

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream rendering_blog {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream rendering_cms {
  server 127.0.0.1:3001;
  keepalive 32;
}

upstream rendering_minio_api {
  server 127.0.0.1:9000;
  keepalive 32;
}

upstream rendering_minio_console {
  server 127.0.0.1:9001;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name rendering.me www.rendering.me cms.rendering.me minio.rendering.me minio-console.rendering.me;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name rendering.me www.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;

  location / {
    proxy_pass http://rendering_blog;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name cms.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;

  location / {
    proxy_pass http://rendering_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name minio.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;
  proxy_buffering off;
  ignore_invalid_headers off;

  location / {
    proxy_pass http://rendering_minio_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name minio-console.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;
  proxy_buffering off;

  location / {
    proxy_pass http://rendering_minio_console;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
  }
}
