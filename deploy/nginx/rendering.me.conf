# Rendering 与 CMS 共用的唯一公网虚拟主机配置。
# Rendering 仓库只安装 /etc/nginx/snippets/rendering-locations.conf，不再声明相同 server_name。

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $http_authorization$http_cookie $cms_cache_bypass {
  default 1;
  "" 0;
}

map $request_method $cms_write_key {
  default "";
  POST $binary_remote_addr;
  PUT $binary_remote_addr;
  PATCH $binary_remote_addr;
  DELETE $binary_remote_addr;
}

limit_req_zone $binary_remote_addr zone=cms_public_read:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=cms_public_search:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=cms_login:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=cms_analytics:10m rate=2r/s;
limit_req_zone $cms_write_key zone=cms_write:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=cms_conn:10m;
limit_req_zone $binary_remote_addr zone=rendering_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=rendering_article:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=rendering_conn:10m;

proxy_cache_path /var/cache/nginx/rendering-cms
  levels=1:2
  keys_zone=cms_public_articles:20m
  max_size=512m
  inactive=30m
  use_temp_path=off;

upstream rendering_blog {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream rendering_cms {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name rendering.me www.rendering.me cms.rendering.me;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name rendering.me www.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;
  include /etc/nginx/snippets/rendering-locations.conf;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name cms.rendering.me;

  ssl_certificate /etc/nginx/ssl/rendering.me/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/rendering.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 20m;
  limit_conn cms_conn 20;
  limit_req_status 429;
  limit_conn_status 429;

  location = /api/v1/articles {
    limit_req zone=cms_public_read burst=20 nodelay;
    proxy_cache cms_public_articles;
    proxy_cache_key "$scheme|$host|$request_uri";
    proxy_cache_bypass $cms_cache_bypass;
    proxy_no_cache $cms_cache_bypass;
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 15s;
    proxy_cache_lock on;
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location = /api/v1/articles/search {
    limit_req zone=cms_public_search burst=4 nodelay;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location ~ ^/api/v1/articles/[0-9A-Za-z-]+$ {
    limit_req zone=cms_public_read burst=20 nodelay;
    proxy_cache cms_public_articles;
    proxy_cache_key "$scheme|$host|$request_uri";
    proxy_cache_bypass $cms_cache_bypass;
    proxy_no_cache $cms_cache_bypass;
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 15s;
    proxy_cache_lock on;
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location = /api/v1/auth/login {
    limit_req zone=cms_login burst=3 nodelay;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location ~ ^/api/v1/(analytics/site-views|articles/[^/]+/views)$ {
    limit_req zone=cms_analytics burst=5 nodelay;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location /api/v1/ {
    limit_req zone=cms_write burst=5 nodelay;
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }

  location / {
    proxy_pass http://rendering_cms;
    include /etc/nginx/snippets/rendering-cms-proxy-headers.conf;
  }
}
