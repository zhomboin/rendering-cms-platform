services:
  postgres:
    image: postgres:16-alpine
    container_name: rendering-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rendering_cms

  migrate:
    image: migrate/migrate:v4.18.3
    profiles:
      - migrate
    volumes:
      - ../backend/migrations:/migrations:ro
    command: ["-path=/migrations", "-database", "${DATABASE_URL:?DATABASE_URL is required}", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rendering_cms

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: rendering-cms-platform-backend:${APP_IMAGE_TAG:-latest}
    container_name: rendering-cms-backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:?FRONTEND_ORIGINS is required}
      LOG_DIR: /var/log/rendering-cms-platform
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT is required}
      S3_REGION: ${S3_REGION:?S3_REGION is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    volumes:
      - backend_logs:/var/log/rendering-cms-platform
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rendering_cms

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    image: rendering-cms-platform-frontend:${APP_IMAGE_TAG:-latest}
    container_name: rendering-cms-frontend
    restart: unless-stopped
    ports:
      - "${PUBLIC_HTTP_BIND:-127.0.0.1:3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rendering_cms

volumes:
  postgres_data:
    name: rendering_cms_postgres_data
  backend_logs:
    name: rendering_cms_backend_logs

networks:
  rendering_cms:
    name: rendering_cms
